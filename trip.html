.nav button:hover{background:#f0ede8}
.nav button:disabled{opacity:.35;cursor:default}
.day-counter{flex:1;text-align:center;font-size:13px;color:#666}
.card{background:#fff;border:1px solid #e0ddd8;border-radius:14px;overflow:hidden;margin-bottom:8px}
.card-header{padding:14px 16px;border-bottom:1px solid #eee;background:#faf9f7}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.date{font-size:12px;color:#888}
.flight-badge{background:#fff3cd;color:#856404;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.checkin-badge{background:#d1f5e0;color:#166534;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.city{font-size:19px;font-weight:600;color:#1a1a1a}
.region{font-size:12px;color:#999;margin-top:2px}
.section{padding:12px 16px;border-bottom:1px solid #f0ede8}
.section:last-child{border-bottom:none}
.sec-label{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.sec-content{font-size:13px;color:#333;line-height:1.55}
.hotel-box{background:#f0f7ff;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.hotel-addr{font-size:13px;color:#1a1a1a;line-height:1.4}
.map-btn{display:inline-flex;align-items:center;gap:5px;background:#1a73e8;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;width:fit-content}
.map-btn:hover{background:#1558c0}
.map-btn svg{width:13px;height:13px;fill:currentColor}
.meals{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meal-box{background:#f8f7f5;border-radius:8px;padding:9px 10px}
.meal-label{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.meal-name{font-size:12px;color:#333;line-height:1.4}
.meal-map{display:inline-flex;align-items:center;gap:4px;margin-top:6px;color:#1a73e8;font-size:11px;font-weight:500;cursor:pointer;background:none;border:none;padding:0;text-decoration:none}
.meal-map svg{width:11px;height:11px;fill:currentColor}
.reservation-box{background:#fff8f0;border:1px solid #fde8c8;border-radius:8px;padding:9px 12px}
.res-text{font-size:12px;color:#7c4a00;line-height:1.45}
.dishes{display:flex;flex-wrap:wrap;gap:5px;margin-top:0}
.dish{background:#eef4ff;color:#1a4a8a;font-size:11px;padding:3px 9px;border-radius:20px}
.sleep-row{display:flex;align-items:center;gap:7px;font-size:12px;color:#666}
.dot{width:7px;height:7px;border-radius:50%;background:#4caf50;flex-shrink:0}
</style>

let cur=0;
function go(d){cur=Math.max(0,Math.min(days.length-1,cur+d));render()}

function mapBtn(url,label){
  if(!url) return '';
  return `<a class="map-btn" href="${url}" target="_blank">${PIN} ${label}</a>`;
}
function mealMapLink(query,label){
  if(!query) return '';
  return `<a class="meal-map" href="${mapsUrl(query)}" target="_blank">${PIN} ${label}</a>`;
}

function render(){
  const d=days[cur];
  document.getElementById('counter').textContent=`Giorno ${cur+1} di ${days.length}`;
  document.getElementById('prevBtn').disabled=(cur===0);
  document.getElementById('nextBtn').disabled=(cur===days.length-1);

  const badges=[];
  if(d.flight) badges.push(`<span class="flight-badge">✈ ${d.flight}</span>`);
  if(d.checkin) badges.push(`<span class="checkin-badge">🔑 Check-in</span>`);

  let html=`<div class="card">
  <div class="card-header">
    <div class="date-row"><span class="date">${d.date}</span>${badges.join('')}</div>
    <div class="city">${d.city}</div>
    <div class="region">${d.region}</div>
  </div>`;

  // Hotel section on check-in days
  if(d.checkin && d.hotel){
    html+=`<div class="section">
      <div class="sec-label">🏨 Albergo / Sistemazione</div>
      <div class="hotel-box">
        <div class="hotel-addr">${d.hotel}</div>
        ${mapBtn(d.hotelUrl,'Naviga all\'albergo')}
      </div>
    </div>`;
  }

  html+=`<div class="section"><div class="sec-label">📍 Attività</div><div class="sec-content">${d.activities}</div></div>`;

  // Meals
  html+=`<div class="section"><div class="sec-label">🍽 Pasti</div>
    <div class="meals">
      <div class="meal-box">
        <div class="meal-label">Pranzo</div>
        <div class="meal-name">${d.pranzo}</div>
        ${mealMapLink(d.pranzoQuery,'Mappa')}
      </div>
      <div class="meal-box">
        <div class="meal-label">Cena</div>
        <div class="meal-name">${d.cena}</div>
        ${mealMapLink(d.cenaQuery,'Mappa')}
      </div>
    </div>
  </div>`;

  // Reservation
  if(d.reservation && d.reservation!=='—' && d.reservation!==''){
    html+=`<div class="section">
      <div class="sec-label">📋 Prenotazione Cena</div>
      <div class="reservation-box"><div class="res-text">${d.reservation}</div></div>
    </div>`;
  }

  // Regional dishes
  if(d.dishes.length){
    html+=`<div class="section">
      <div class="sec-label">🍴 Piatti regionali da provare</div>
      <div class="dishes">${d.dishes.map(x=>`<span class="dish">${x}</span>`).join('')}</div>
    </div>`;
  }

  // Sleep
  html+=`<div class="section"><div class="sleep-row"><span class="dot"></span><span>Pernottamento: ${d.hotel||d.city}</span></div></div>`;

  html+=`</div>`;
  document.getElementById('card').innerHTML=html;
}
render();
</script>
</body>
</html>
